<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="./index.js"></script>
</head>

<body>
<style>
     #demo123WEFWF{
        position: relative;
     }
    #demo123WEFWF input{
        padding: 0;
        margin-top: 0px;
        height: 20px;
        width: 200px;
        box-sizing: border-box;
        outline: none;
        /* height: 50px; */
    }
    #demo123WEFWF div{
        box-sizing: border-box;
        display: none;
        margin-bottom: 8px;
        padding-left: 10px;
        height:40px;
        width: 200px;
        background-color: white;
        box-shadow: 0 0 8px gray;
        line-height: 40px;
        font-size: 30px;

        word-break: keep-all;
        overflow-x: auto;
        overflow-y: hidden;
    }
    #demo123WEFWF div::-webkit-scrollbar{
    /* 清除滚动条 */
        /* display: none; */
        height: 2px;
    }
    #demo123WEFWF div::-webkit-scrollbar-thumb{
        /* height: 3px; */
        background-color: gray;
    }
    #demo123WEFWF::after{
        position:absolute;
        top: 40px;
        left: 10px;
        display: block;
        content: "";
        width: 0;
        height: 0;
        border-top: 5px solid white;
        border-bottom: 5px solid transparent;
        border-left: 5px solid transparent;
        border-right: 5px solid transparent;
    }
</style>
<div id="demo123WEFWF">
    <div></div>
    <input type="text" >
</div>
<script>
    var demo123WEFWF = document.querySelector("#demo123WEFWF")
    var input = demo123WEFWF.querySelector("input")
    var div = demo123WEFWF.querySelector("div")
    input.addEventListener("keyup",function(event){
        if(this.value=="")
        {
            div.style.display="none"
        }else{
            div.style.display="block"
            div.innerHTML=this.value;
            div.scrollLeft =div.scrollWidth;//使滚动条右对齐，以始终显示最新内容
        }
    })
    input.addEventListener("focus",function(){//获得焦点后显示盒子
        if(this.value!="")
            div.style.display="block"
    })
    input.addEventListener("blur",function(){//失去焦点后隐藏盒子
        div.style.display="none"
    })
</script>
</body>
</html>
